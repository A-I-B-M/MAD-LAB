<html>

<head>
	<title>BMI Calculator</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<link rel="stylesheet" type="text/css" href="stylesheet.css">
	<link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
	<!-- [EDIT]: Removed internal <style> block and class attributes to comply with no-CSS requirement -->
</head>

<body>
	<div class="container">
		<div class="panel">
			<h2 class="text-center">BMI Calculator</h2>

			<p id="introText" class="text-center">Discover your Body Mass Index with precision</p>

			<form>
				<!-- [EDIT]: Improved labels and input placeholders without adding any new CSS styles -->
				<div id="weightInput">
					<p>Weight (kg)</p>
					<input id="weight" type="number" placeholder="e.g. 70" step="0.1" />
				</div>
				<div id="heightInput">
					<p>Height (cm)</p>
					<input id="height" type="number" placeholder="e.g. 175" step="0.1" />
				</div>
				<button id="calcBtn" type="button" class="btn">Calculate Now</button>
			</form>
			<div id="results" class="text-center">Your results will appear here</div>
		</div>
	</div>
	<script src="main.js"></script>
</body>

</html>
